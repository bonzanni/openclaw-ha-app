<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OpenClaw</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f2f2f7;--surface:#fff;--text:#1c1c1e;--text-secondary:#8e8e93;
  --accent:#03a9f4;--divider:#e0e0e0;--tab-height:48px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111;--surface:#1c1c1e;--text:#e5e5e7;--text-secondary:#8e8e93;
  --accent:#03a9f4;--divider:#333;
}}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:Roboto,system-ui,sans-serif}
#tabs{display:flex;height:var(--tab-height);background:var(--surface);border-bottom:1px solid var(--divider)}
.tab{
  flex:1;padding:0 16px;line-height:var(--tab-height);text-align:center;
  cursor:pointer;font-size:14px;font-weight:500;letter-spacing:.25px;
  color:var(--text-secondary);border:none;background:none;
  border-bottom:2px solid transparent;transition:color .2s,border-color .2s;
}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
#content{height:calc(100% - var(--tab-height));position:relative}
.frame{position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:none}
.frame.active{display:block}
</style>
</head>
<body>
<div id="tabs">
  <button class="tab active" data-target="terminal">Terminal</button>
  <button class="tab" data-target="gateway">Gateway</button>
</div>
<div id="content">
  <iframe id="frame-terminal" class="frame active"></iframe>
  <iframe id="frame-gateway" class="frame"></iframe>
</div>
<script>
(function() {
  var root = window.location.href.split('__setup')[0];
  var settingsKey = 'openclaw.control.settings.v1';

  function buildGatewayUrl(token) {
    var wsUrl = root.replace(/^https:/,'wss:').replace(/^http:/,'ws:');
    var hash = token ? '#token=' + token : '';
    return root + '?gatewayUrl=' + encodeURIComponent(wsUrl) + hash;
  }

  function hasStoredToken() {
    try {
      var s = JSON.parse(localStorage.getItem(settingsKey) || '{}');
      return !!s.token;
    } catch(e) { return false; }
  }

  fetch('__setup_config.json').then(function(r){return r.json()}).then(function(cfg) {
    var token = cfg.gateway_token || '';

    if (!cfg.terminal_enabled) {
      if (hasStoredToken()) {
        location.replace(root);
      } else {
        location.replace(buildGatewayUrl(token));
      }
      return;
    }

    // Terminal enabled — show tabbed UI
    var termFrame = document.getElementById('frame-terminal');
    var gwFrame = document.getElementById('frame-gateway');
    termFrame.src = root + 'terminal/';

    var gwUrl = hasStoredToken() ? root : buildGatewayUrl(token);

    var tabs = document.querySelectorAll('.tab');
    tabs.forEach(function(t) {
      t.addEventListener('click', function() {
        var target = t.dataset.target;
        tabs.forEach(function(b){b.classList.toggle('active', b.dataset.target===target)});
        termFrame.classList.toggle('active', target==='terminal');
        gwFrame.classList.toggle('active', target==='gateway');
        if (target==='gateway' && !gwFrame.src) gwFrame.src = gwUrl;
      });
    });
  }).catch(function() {
    if (hasStoredToken()) {
      location.replace(root);
    } else {
      location.replace(buildGatewayUrl(''));
    }
  });
})();
</script>
</body>
</html>
