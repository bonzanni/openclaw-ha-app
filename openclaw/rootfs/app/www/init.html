<!DOCTYPE html>
<html><head><meta charset="utf-8"></head><body><script>
// Construct the gateway WS URL from the current page location
var base = location.href.split('?')[0].split('#')[0];
if (!base.endsWith('/')) base += '/';
var wsUrl = base.replace(/^http/, 'ws');
// Redirect with gatewayUrl and token (token in hash, never sent to server)
location.replace(base + '?gatewayUrl=' + encodeURIComponent(wsUrl) + '#token=TOKEN_PLACEHOLDER');
</script></body></html>
